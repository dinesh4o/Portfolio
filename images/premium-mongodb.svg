
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
            <stop offset="0%" stop-color="#00684A" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#0a0a0a" />
        </radialGradient>
        
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="80" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="50" stdDeviation="40" flood-color="#000" flood-opacity="0.9"/>
        </filter>
        <filter id="floatShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="20" stdDeviation="15" flood-color="#000" flood-opacity="0.8"/>
        </filter>

        <clipPath id="screenClip">
            <rect x="150" y="240" width="900" height="530" rx="0" ry="0" />
        </clipPath>
        <clipPath id="cardClip">
            <rect x="150" y="200" width="900" height="570" rx="20" ry="20" />
        </clipPath>
    </defs>

    <rect width="1200" height="900" fill="url(#bgGrad)" />

    <!-- Deep Ambient Glow -->
    <ellipse cx="600" cy="450" rx="500" ry="300" fill="#00ED64" opacity="0.15" filter="url(#glow)" />

    <!-- Main Mockup -->
    <g filter="url(#dropShadow)">
        <rect x="140" y="190" width="920" height="590" rx="28" ry="28" fill="#111" stroke="#2a2a2a" stroke-width="2"/>
        
        <!-- Inner Card -->
        <g clip-path="url(#cardClip)">
            <rect x="150" y="200" width="900" height="570" fill="#000"/>
            
            <!-- Top Bar -->
            <rect x="150" y="200" width="900" height="40" fill="#161616"/>
            <!-- Dots -->
            <circle cx="180" cy="220" r="5" fill="#333"/>
            <circle cx="198" cy="220" r="5" fill="#333"/>
            <circle cx="216" cy="220" r="5" fill="#333"/>
            
            <!-- Address Bar -->
            <rect x="350" y="210" width="500" height="20" rx="10" fill="#0d0d0d" stroke="#222"/>

            <!-- Embedded Image -->
            <image href="Screenshot 2026-06-18 153327.png" x="150" y="240" width="900" height="530" preserveAspectRatio="xMidYTop slice" clip-path="url(#screenClip)" />
        </g>
    </g>
    
    <!-- Floating Decorative Elements to add premium feel -->
    <rect x="80" y="140" width="160" height="120" rx="16" fill="#161616" stroke="#333" filter="url(#floatShadow)" opacity="0.95"/>
    <rect x="960" y="620" width="180" height="140" rx="16" fill="#161616" stroke="#333" filter="url(#floatShadow)" opacity="0.95"/>
    
    <!-- Decorative mini UI lines inside floating blocks -->
    <rect x="100" y="160" width="80" height="8" rx="4" fill="#00ED64" opacity="0.6"/>
    <rect x="100" y="180" width="120" height="6" rx="3" fill="#333"/>
    <rect x="100" y="196" width="100" height="6" rx="3" fill="#333"/>

    <rect x="980" y="640" width="140" height="8" rx="4" fill="#00ED64" opacity="0.6"/>
    <circle cx="1000" cy="680" r="15" fill="#222"/>
    <rect x="1030" y="670" width="90" height="6" rx="3" fill="#333"/>
    <rect x="1030" y="684" width="60" height="6" rx="3" fill="#333"/>
</svg>
